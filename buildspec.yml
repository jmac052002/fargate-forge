version: 0.2

phases:
  install:
    runtime-versions:
      python: 3.11
    commands:
      - pip install -r app/requirements.txt

  pre_build:
    commands:
      - echo Logging in to Amazon ECR...
      - aws ecr get-login-password --region $AWS_DEFAULT_REGION | docker login --username AWS --password-stdin $ECR_REPO_URL
      - echo Running tests...
      - pytest tests/ -v --tb=short

  build:
    commands:
      - echo Building Docker image...
      - docker build -t $ECR_REPO_URL:latest -t $ECR_REPO_URL:$CODEBUILD_BUILD_NUMBER ./app

  post_build:
    commands:
      - echo Pushing Docker image to ECR...
      - docker push $ECR_REPO_URL:latest
      - docker push $ECR_REPO_URL:$CODEBUILD_BUILD_NUMBER
      - echo Generating taskdef.json from live ECS task definition...
      - aws ecs describe-task-definition --task-definition fargate-forge-app --query taskDefinition > taskdef.json
      - python3 -c "import json; f=open('taskdef.json'); td=json.load(f); f.close(); [c.update({'image':'<IMAGE1_NAME>'}) for c in td['containerDefinitions'] if c['name']=='fargate-forge-app']; open('taskdef.json','w').write(json.dumps(td, indent=2))"
      - echo Writing image definitions file...
      - printf '{"ImageURI":"%s"}' "$ECR_REPO_URL:$CODEBUILD_BUILD_NUMBER" > imageDetail.json
      - echo === taskdef.json contents ===
      - cat taskdef.json
      - echo === imageDetail.json contents ===
      - cat imageDetail.json

artifacts:
  files:
    - appspec.yaml
    - taskdef.json
    - imageDetail.json